services:
  data-privacy:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BUILD_NPM_TOKEN: ${BUILD_NPM_TOKEN}
        VITE_KEYCLOAK_URL: ${KEYCLOAK_PROXY_URL}
        VITE_COMMUNITY_KEY: ${COMMUNITY_KEY}
        VITE_STANDALONE_MODE: ${SINGLE_COMMUNITY_MODE}
    restart: unless-stopped
    networks:
      - core_plugin_network
      - proxy_network