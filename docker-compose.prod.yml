services:
  data-privacy:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      args:
        BUILD_NPM_TOKEN: ${BUILD_NPM_TOKEN}
        VITE_KEYCLOAK_URL: ${KEYCLOAK_PROXY_URL}
        VITE_COMMUNITY_KEY: ${COMMUNITY_KEY}
        VITE_STANDALONE_MODE: ${SINGLE_COMMUNITY_MODE}
        VITE_SIDEBAR_DEV_MODE: False
    restart: unless-stopped
    networks:
      - core_plugin_network
      - proxy_network